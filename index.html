<!DOCTYPE html>
<html>
    <head>
        <title>Nemo Loves Clicks</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="flash"></div>
        <div id="intro">
            <div id="particles"></div>
            <div class="intro-text active">
                NEMO DONUT<br>PRESENTS... 
            </div>
            <div class="intro-text">
                AN IDLE CLICKER<br>THAT NOBODY ASKED FOR<br>BUT EVERYONE NEEDS
            </div>
            <div class="intro-text">
                DEAR PLAYER
            </div>
            <div class="intro-text">
                PREPARE YOUR FINGERSSS FOR...
            </div>
            <div class="intro-text finalTitle">
                NEMO<br>LOVES<br>CLICKS
            </div>
        </div>
        <div id="game" style="display: none;">
            <h1>NEMO LOVES CLICKS</h1>
            <div id="clickCounter">
                0 Clicks 
            </div>
            <div id="streakCounter">
                <span id="comboTitle">
                    <img id="comboIcon" class="comboIcon" src="assets/attachments (1)/Tinder.png"> Combo
                </span>
                <span id="comboNumber">
                    x0
                </span>
            </div>
            <div id="multiplierDisplay">
                x1 Multiplier
            </div>
            <div id="playerTitle">
                Lurker 
            </div>
            <img id="nemo" src="assets/attachments (2)/sprite.png" alt="Nemo">
            <div id="achievementToast"></div>
            <div id="saveText">
                Progress Saved!
            </div>
            <img id="shopButton" src="assets/attachments (1)/Amazon-Shopping.png" alt="Shop">
            <div id="shopOverlay"></div>
            <div id="shop">
                <h2>Shop</h2>
                <button id="buyCursor">
                    Tiny Cursor (50)
                </button>
                <button id="buyClanker">
                    Clanker
                </button>
            </div>
            <img id="foodButton" src="assets/attachments (1)/Uber-Eats.png">
            <div id="foodShop">
                <button id="buyEnergyDrink">
                    Energy Drink (250)
                </button>
                <button id="buyClankerJuice">
                    Clanker Juice
                </button>
            </div>
            <img src="assets/attachments (1)/Files.png" id="collectionButton">
            <div id="collectionWindow">
                <div id="collectionTabs">
                    <button id="nemojiTab">
                        Nemojis
                    </button>
                    <button id="achievementTab">
                        Achievements
                    </button>
                </div>
                <div id="nemojiPage"></div>
                <div id="achievementPage" style="display: none;"></div>
            </div>
            <div id="energyDrinkUI">
                <img src="assets/attachments (1)/Starfait.png" id="energyDrinkIcon">
                <div id="energyDrinkFill"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
    
</html>
